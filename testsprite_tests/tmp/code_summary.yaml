version: "2"
type: frontend
tech_stack:
  - TypeScript
  - SvelteKit
  - Tailwind CSS
  - Vite
routes:
  - path: /
    file: src/routes/+page.svelte
    auth_required: false
    description: Risk Calculator page where users input capital, risk, and price levels.
  - path: /journal
    file: src/routes/journal/+page.svelte
    auth_required: false
    description: Trading Journal page displaying saved calculations and trade outcomes.
  - path: /about
    file: src/routes/about/+page.svelte
    auth_required: false
    description: Information about the RiskNode application.
features:
  - name: Risk Calculation
    description: Deterministically calculate position size based on capital, risk percentage, entry price, and stop loss price.
    files:
      - src/routes/+page.svelte
      - src/lib/store.ts
    entry_route: /
    user_interactions:
      - Enter capital in data-testid="input-modal"
      - Enter risk % in data-testid="input-risiko" (max 5%)
      - Enter entry price in data-testid="input-entry"
      - Enter stop loss price in data-testid="input-stoploss"
      - See calculated position size automatically
      - Click "Save to Journal" button (data-testid="btn-calculate")
    api_calls: []
    auth_required: false
  - name: Journal Management
    description: Persist and manage trade entries in local storage.
    files:
      - src/routes/journal/+page.svelte
      - src/lib/store.ts
    entry_route: /journal
    user_interactions:
      - Mark trade as Won using data-testid="btn-won"
      - Mark trade as Lost using data-testid="btn-lost"
      - Delete trade entry using data-testid="btn-delete"
      - Clear entire journal using data-testid="btn-delete-all"
    api_calls: []
    auth_required: false
known_limitations: []
