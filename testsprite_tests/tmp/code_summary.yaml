version: "2"
type: frontend
tech_stack:
  - TypeScript
  - SvelteKit
  - Tailwind CSS
  - Google Generative AI (Gemini)
routes:
  - path: /
    file: src/routes/+page.svelte
    auth_required: false
    description: Risk Calculator and Journal entry page
  - path: /journal
    file: src/routes/journal/+page.svelte
    auth_required: false
    description: Trading Journal where entries are listed and evaluated by AI
  - path: /api/roast
    file: src/routes/api/roast/+server.ts
    auth_required: false
    description: AI evaluation endpoint using Gemini
features:
  - name: Risk Calculator
    description: Calculates position size based on capital, risk %, entry price, and stop loss.
    files:
      - src/routes/+page.svelte
    entry_route: /
    user_interactions:
      - Fill Capital input field (data-testid="input-modal")
      - Fill Risk % input field (data-testid="input-risiko")
      - Fill Entry Price input field (data-testid="input-entry")
      - Fill Stop Loss Price input field (data-testid="input-stoploss")
      - Fill Target Ratio input field (data-testid="input-ratio")
      - Click "Save to Journal" button (data-testid="btn-calculate")
  - name: Trading Journal
    description: List and manage trading history stored in localStorage.
    files:
      - src/routes/journal/+page.svelte
      - src/lib/store.ts
    entry_route: /journal
    user_interactions:
      - Navigate to journal page
      - View trade entries
      - Click "Winning" button (data-testid="btn-won") to mark trade as Won
      - Click "Losing" button (data-testid="btn-lost") to mark trade as Lost
      - Click Delete icon (data-testid="btn-delete") to remove an entry
      - Click "Delete All" (data-testid="btn-delete-all") to clear journal
  - name: AI Risk Evaluator (Roast)
    description: Uses Gemini AI to evaluate trading discipline based on journal data.
    files:
      - src/routes/api/roast/+server.ts
    entry_route: /journal
    user_interactions:
      - Click "Evaluate My Journal" button (data-testid="btn-roast")
      - See AI roast feedback message
    api_calls:
      - method: POST
        endpoint: /api/roast
known_limitations: []
