version: "2"
type: frontend
tech_stack:
  - TypeScript
  - SvelteKit
  - Tailwind CSS
  - Gemini SDK (for AI Roast)
routes:
  - path: /
    file: src/routes/+page.svelte
    auth_required: false
    description: Risk Calculator and entry page
  - path: /journal
    file: src/routes/journal/+page.svelte
    auth_required: false
    description: Trading Journal where trades are displayed and AI roast is triggered
features:
  - name: Risk Calculation
    description: Calculate position size and target profit based on risk parameters
    files:
      - src/routes/+page.svelte
    entry_route: /
    user_interactions:
      - Fill Capital input
      - Fill Risk % input
      - Fill Entry Price input
      - Fill Stop Loss input
      - Modify Target Ratio (1:X) input
    api_calls: []
    auth_required: false
  - name: Trade Journaling
    description: Save trades to local storage and manage them in a list
    files:
      - src/routes/+page.svelte
      - src/routes/journal/+page.svelte
      - src/lib/store.ts
    entry_route: /
    user_interactions:
      - Click Save Button (btn-save) to commit trade
      - Navigate to Journal (nav-journal)
      - Mark trade as Won (btn-won)
      - Mark trade as Lost (btn-lost)
      - Delete a trade (btn-delete)
    api_calls: []
    auth_required: false
  - name: AI Risk Evaluator (Roast)
    description: AI identifies bad trading discipline and roasts the user
    files:
      - src/routes/journal/+page.svelte
      - src/routes/api/roast/+server.ts
    entry_route: /journal
    user_interactions:
      - Click Evaluate Button (btn-evaluate) to get AI feedback
    api_calls:
      - method: POST
        endpoint: /api/roast
    auth_required: false
known_limitations:
  - issue: Data is stored in localStorage only
    location: src/lib/store.ts
    impact: Data does not persist across different browsers or devices
